<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap');

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: 'General Sans', system-ui, sans-serif;
  }

  .card {
    width: 1200px;
    height: 630px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Browser frame mockup */
  .browser {
    width: 920px;
    height: 520px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 25px 80px rgba(0,0,0,0.08), 0 4px 20px rgba(0,0,0,0.04);
    position: relative;
    z-index: 1;
  }

  .browser-toolbar {
    height: 40px;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 8px;
  }

  .browser-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    opacity: 0.4;
  }

  .browser-url {
    margin-left: 16px;
    padding: 4px 16px;
    border-radius: 6px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.02em;
    opacity: 0.5;
  }

  .browser-content {
    height: 480px;
    padding: 32px;
    position: relative;
    overflow: hidden;
  }

  /* Decorative shapes */
  .deco {
    position: absolute;
    border-radius: 50%;
    opacity: 0.06;
    z-index: 0;
  }
</style>
</head>
<body></body>
</html>
