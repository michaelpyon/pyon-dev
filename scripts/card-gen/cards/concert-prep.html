<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=Epilogue:wght@700;800;900&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 630px; overflow: hidden; font-family: 'General Sans', system-ui, sans-serif; }

  .card {
    width: 1200px; height: 630px;
    background: linear-gradient(135deg, #E8E5DD 0%, #E2E0D6 50%, #DDD9CF 100%);
    position: relative; display: flex; align-items: center; justify-content: center;
  }

  /* Decorative circles - warm amber tint */
  .deco1 { position: absolute; width: 400px; height: 400px; border-radius: 50%; background: #FFB300; opacity: 0.05; top: -100px; right: -80px; }
  .deco2 { position: absolute; width: 250px; height: 250px; border-radius: 50%; background: #FFB300; opacity: 0.04; bottom: -60px; left: -40px; }

  .browser {
    width: 900px; height: 500px; border-radius: 12px; overflow: hidden;
    background: #131313;
    box-shadow: 0 25px 80px rgba(0,0,0,0.12), 0 4px 20px rgba(0,0,0,0.06);
    position: relative; z-index: 1;
  }

  .toolbar {
    height: 36px; background: #0e0e0e; display: flex; align-items: center; padding: 0 14px; gap: 6px;
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot.r { background: #ff5f57; opacity: 0.7; }
  .dot.y { background: #febc2e; opacity: 0.7; }
  .dot.g { background: #28c840; opacity: 0.7; }
  .url {
    margin-left: 20px; background: rgba(255,255,255,0.06); padding: 3px 14px; border-radius: 5px;
    font-size: 11px; font-family: 'JetBrains Mono', monospace; color: rgba(255,255,255,0.3);
  }

  .content { padding: 28px 32px; color: #e5e2e1; }

  /* Stage label */
  .stage-label {
    font-family: 'Space Grotesk', monospace;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.3em;
    color: #FFB300;
    margin-bottom: 8px;
  }

  /* Main headline */
  .headline {
    font-family: 'Epilogue', system-ui, sans-serif;
    font-weight: 900;
    font-size: 36px;
    letter-spacing: -1.5px;
    line-height: 1;
    color: #e5e2e1;
    margin-bottom: 24px;
  }
  .headline .amber { color: #FFB300; }

  /* Search bar mockup */
  .search-bar {
    background: #201f1f;
    border-bottom: 2px solid #FFB300;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .search-icon {
    color: #FFB300;
    font-size: 20px;
    font-weight: 600;
  }
  .search-text {
    font-family: 'Epilogue', system-ui, sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: #e5e2e1;
  }

  /* Result rows */
  .results {
    background: #2a2a2a;
  }
  .result-row {
    padding: 12px 20px;
    background: #1c1b1b;
    margin-bottom: 1px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .result-name {
    font-family: 'Epilogue', system-ui, sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: #e5e2e1;
  }
  .result-tag {
    font-family: 'Space Grotesk', monospace;
    font-size: 8px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    background: #0e0e0e;
    color: rgba(214, 196, 172, 0.8);
    padding: 3px 8px;
    margin-top: 4px;
    display: inline-block;
  }
  .result-arrow {
    color: rgba(214, 196, 172, 0.3);
    font-size: 14px;
  }

  /* Song count pills at bottom */
  .song-pills {
    display: flex;
    gap: 6px;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  .pill {
    font-family: 'Space Grotesk', monospace;
    font-size: 8px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    background: #0e0e0e;
    color: rgba(214, 196, 172, 0.6);
    padding: 4px 8px;
  }
  .pill.amber {
    color: #FFB300;
    background: rgba(255, 179, 0, 0.1);
  }
</style>
</head>
<body>
<div class="card">
  <div class="deco1"></div>
  <div class="deco2"></div>
  <div class="browser">
    <div class="toolbar">
      <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
      <div class="url">concert.michaelpyon.com</div>
    </div>
    <div class="content">
      <div class="stage-label">Stage 01: Identification</div>
      <div class="headline">
        Who are you<br>
        <span class="amber">seeing?</span>
      </div>

      <div class="search-bar">
        <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#FFB300" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span class="search-text">Radiohead</span>
      </div>

      <div class="results">
        <div class="result-row">
          <div>
            <div class="result-name">Radiohead</div>
          </div>
          <div class="result-arrow">&#x2192;</div>
        </div>
        <div class="result-row">
          <div>
            <div class="result-name">An Evening of Radiohead</div>
            <div class="result-tag">Radiohead cover band</div>
          </div>
          <div class="result-arrow">&#x2192;</div>
        </div>
        <div class="result-row">
          <div>
            <div class="result-name">Fake Plastic Radiohead</div>
          </div>
          <div class="result-arrow">&#x2192;</div>
        </div>
      </div>

      <div class="song-pills">
        <span class="pill amber">25 songs found</span>
        <span class="pill">2+2=5</span>
        <span class="pill">Airbag</span>
        <span class="pill">The Bends</span>
        <span class="pill">Nude</span>
        <span class="pill">Reckoner</span>
        <span class="pill">Weird Fishes</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
