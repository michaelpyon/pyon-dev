<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 630px; overflow: hidden; font-family: 'General Sans', system-ui, sans-serif; }

  .card {
    width: 1200px; height: 630px;
    background: linear-gradient(135deg, #E8E5DD 0%, #E2E0D6 50%, #DDD9CF 100%);
    position: relative; display: flex; align-items: center; justify-content: center;
  }

  /* Decorative circles */
  .deco1 { position: absolute; width: 400px; height: 400px; border-radius: 50%; background: #4ade80; opacity: 0.05; top: -100px; right: -80px; }
  .deco2 { position: absolute; width: 250px; height: 250px; border-radius: 50%; background: #4ade80; opacity: 0.04; bottom: -60px; left: -40px; }

  .browser {
    width: 900px; height: 500px; border-radius: 12px; overflow: hidden;
    background: #1c1f26;
    box-shadow: 0 25px 80px rgba(0,0,0,0.12), 0 4px 20px rgba(0,0,0,0.06);
    position: relative; z-index: 1;
  }

  .toolbar {
    height: 36px; background: #15171d; display: flex; align-items: center; padding: 0 14px; gap: 6px;
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot.r { background: #ff5f57; opacity: 0.7; }
  .dot.y { background: #febc2e; opacity: 0.7; }
  .dot.g { background: #28c840; opacity: 0.7; }
  .url {
    margin-left: 20px; background: rgba(255,255,255,0.06); padding: 3px 14px; border-radius: 5px;
    font-size: 11px; font-family: 'JetBrains Mono', monospace; color: rgba(255,255,255,0.3);
  }

  .content { padding: 28px 32px; color: #e8e6e0; }

  .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
  .logo { font-size: 22px; font-weight: 700; color: #4ade80; letter-spacing: -0.5px; }
  .badge { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: #4ade80; background: rgba(74,222,128,0.1); padding: 4px 10px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.08em; }
  .subtitle { font-size: 12px; color: rgba(232,230,224,0.4); margin-top: 4px; }

  /* Table */
  .table { width: 100%; margin-top: 8px; }
  .table-header {
    display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 80px;
    padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.06);
    font-size: 10px; font-family: 'JetBrains Mono', monospace; color: rgba(255,255,255,0.25);
    text-transform: uppercase; letter-spacing: 0.1em;
  }
  .table-row {
    display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 80px;
    padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
    font-size: 13px; align-items: center;
  }
  .game { font-weight: 500; color: #e8e6e0; }
  .num { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: rgba(255,255,255,0.5); }
  .change-up { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #4ade80; }
  .change-down { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #f87171; }
  .tag { font-size: 9px; font-family: 'JetBrains Mono', monospace; padding: 3px 8px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.05em; text-align: center; }
  .tag-win { background: rgba(74,222,128,0.15); color: #4ade80; }
  .tag-loss { background: rgba(248,113,113,0.15); color: #f87171; }
  .tag-watch { background: rgba(251,191,36,0.15); color: #fbbf24; }
</style>
</head>
<body>
<div class="card">
  <div class="deco1"></div>
  <div class="deco2"></div>
  <div class="browser">
    <div class="toolbar">
      <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
      <div class="url">shooter.michaelpyon.com</div>
    </div>
    <div class="content">
      <div class="header">
        <div>
          <div class="logo">ShooterDigest</div>
          <div class="subtitle">Week 11 Intelligence Brief</div>
        </div>
        <div class="badge">Top Movers</div>
      </div>
      <div class="table">
        <div class="table-header">
          <span>Game</span><span>Peak</span><span>6 WoW</span><span>Call</span><span></span>
        </div>
        <div class="table-row">
          <span class="game">CS2</span><span class="num">1.28M</span><span class="change-up">+4.2%</span><span><span class="tag tag-win">WIN</span></span><span></span>
        </div>
        <div class="table-row">
          <span class="game">Apex Legends</span><span class="num">187K</span><span class="change-up">+11.8%</span><span><span class="tag tag-win">WIN</span></span><span></span>
        </div>
        <div class="table-row">
          <span class="game">Destiny 2</span><span class="num">62K</span><span class="change-down">-9.1%</span><span><span class="tag tag-loss">LOSS</span></span><span></span>
        </div>
        <div class="table-row">
          <span class="game">XDefiant</span><span class="num">41K</span><span class="change-down">-22.4%</span><span><span class="tag tag-loss">LOSS</span></span><span></span>
        </div>
        <div class="table-row">
          <span class="game">Marathon</span><span class="num">73K</span><span class="change-up">+3.7%</span><span><span class="tag tag-watch">WATCH</span></span><span></span>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
