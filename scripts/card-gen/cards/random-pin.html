<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 630px; overflow: hidden; font-family: 'General Sans', system-ui, sans-serif; }

  .card {
    width: 1200px; height: 630px;
    background: linear-gradient(135deg, #E8E5DD 0%, #E5DFD8 50%, #E0D9CF 100%);
    position: relative; display: flex; align-items: center; justify-content: center;
  }

  .deco1 { position: absolute; width: 500px; height: 500px; border-radius: 50%; background: #f472b6; opacity: 0.04; top: -200px; right: -100px; }
  .deco2 { position: absolute; width: 300px; height: 300px; border-radius: 50%; background: #fb923c; opacity: 0.04; bottom: -100px; left: 100px; }

  .browser {
    width: 900px; height: 500px; border-radius: 12px; overflow: hidden;
    background: #faf8f4;
    box-shadow: 0 25px 80px rgba(0,0,0,0.10), 0 4px 20px rgba(0,0,0,0.04);
    position: relative; z-index: 1;
  }

  .toolbar {
    height: 36px; background: #f0ede5; display: flex; align-items: center; padding: 0 14px; gap: 6px;
    border-bottom: 1px solid rgba(0,0,0,0.06);
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot.r { background: #ff5f57; opacity: 0.7; }
  .dot.y { background: #febc2e; opacity: 0.7; }
  .dot.g { background: #28c840; opacity: 0.7; }
  .url {
    margin-left: 20px; background: rgba(0,0,0,0.04); padding: 3px 14px; border-radius: 5px;
    font-size: 11px; font-family: 'JetBrains Mono', monospace; color: rgba(0,0,0,0.3);
  }

  .content { padding: 0; height: 464px; display: flex; position: relative; }

  .map {
    flex: 1; background: #e8e3d9; position: relative; overflow: hidden;
  }

  /* Simplified map elements */
  .land { position: absolute; background: #d4cfc3; border-radius: 4px; }
  .water { position: absolute; background: #c8d6e0; border-radius: 8px; opacity: 0.5; }

  .pin {
    position: absolute; top: 45%; left: 55%; transform: translate(-50%, -100%);
    z-index: 5;
  }
  .pin-head { width: 32px; height: 32px; background: #f472b6; border-radius: 50% 50% 50% 0; transform: rotate(-45deg); box-shadow: 0 4px 12px rgba(244,114,182,0.3); }
  .pin-pulse { position: absolute; top: 26px; left: 10px; width: 12px; height: 12px; background: rgba(244,114,182,0.2); border-radius: 50%; }

  .panel {
    width: 300px; background: #faf8f4; padding: 28px; border-left: 1px solid rgba(0,0,0,0.06);
  }

  .panel-title { font-size: 18px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
  .panel-sub { font-size: 11px; color: rgba(0,0,0,0.35); margin-bottom: 20px; font-family: 'JetBrains Mono', monospace; }

  .cuisine-tag {
    display: inline-block; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 500;
    margin: 3px 4px; background: rgba(244,114,182,0.08); color: #c0548a;
  }
  .cuisine-tag.alt { background: rgba(251,146,60,0.08); color: #c67a3a; }
  .cuisine-tag.alt2 { background: rgba(74,222,128,0.08); color: #4a8f5a; }

  .stat { margin-top: 20px; padding-top: 16px; border-top: 1px solid rgba(0,0,0,0.06); }
  .stat-label { font-size: 9px; font-family: 'JetBrains Mono', monospace; color: rgba(0,0,0,0.25); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 4px; }
  .stat-value { font-size: 22px; font-weight: 600; color: #1a1a1a; font-family: 'JetBrains Mono', monospace; }
  .stat-detail { font-size: 11px; color: rgba(0,0,0,0.3); margin-top: 2px; }

  /* Grid lines */
  .grid-h, .grid-v { position: absolute; background: rgba(0,0,0,0.03); }
  .grid-h { width: 100%; height: 1px; }
  .grid-v { width: 1px; height: 100%; }
</style>
</head>
<body>
<div class="card">
  <div class="deco1"></div>
  <div class="deco2"></div>
  <div class="browser">
    <div class="toolbar">
      <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
      <div class="url">random-pin.michaelpyon.com</div>
    </div>
    <div class="content">
      <div class="map">
        <!-- Simplified land masses -->
        <div class="land" style="width: 180px; height: 260px; top: 40px; left: 60px; border-radius: 20px 40px 30px 20px;"></div>
        <div class="land" style="width: 120px; height: 140px; top: 120px; left: 260px; border-radius: 30px;"></div>
        <div class="land" style="width: 200px; height: 80px; top: 300px; left: 100px; border-radius: 20px;"></div>
        <div class="water" style="width: 300px; height: 160px; top: 200px; left: 200px;"></div>

        <!-- Grid -->
        <div class="grid-h" style="top: 25%;"></div>
        <div class="grid-h" style="top: 50%;"></div>
        <div class="grid-h" style="top: 75%;"></div>
        <div class="grid-v" style="left: 25%;"></div>
        <div class="grid-v" style="left: 50%;"></div>
        <div class="grid-v" style="left: 75%;"></div>

        <div class="pin">
          <div class="pin-head"></div>
          <div class="pin-pulse"></div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-title">Naples, Italy</div>
        <div class="panel-sub">40.8518&deg;N, 14.2681&deg;E</div>

        <div class="cuisine-tag">Margherita Pizza</div>
        <div class="cuisine-tag alt">Sfogliatella</div>
        <div class="cuisine-tag alt2">Rag&ugrave;</div>
        <div class="cuisine-tag">Frittatina</div>
        <div class="cuisine-tag alt">Bab&agrave;</div>
        <div class="cuisine-tag alt2">Cuoppo</div>

        <div class="stat">
          <div class="stat-label">Restaurants Found</div>
          <div class="stat-value">247</div>
          <div class="stat-detail">within 2km radius</div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
