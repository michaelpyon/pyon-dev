<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 630px; overflow: hidden; font-family: 'General Sans', system-ui, sans-serif; }

  .card {
    width: 1200px; height: 630px;
    background: linear-gradient(135deg, #E8E5DD 0%, #E2DFD9 50%, #DDD8D0 100%);
    position: relative; display: flex; align-items: center; justify-content: center;
  }

  .deco1 { position: absolute; width: 500px; height: 500px; border-radius: 50%; background: #c4b5fd; opacity: 0.12; top: -150px; left: -100px; }
  .deco2 { position: absolute; width: 300px; height: 300px; border-radius: 50%; background: #a78bfa; opacity: 0.08; bottom: -80px; right: -50px; }

  .browser {
    width: 900px; height: 500px; border-radius: 12px; overflow: hidden;
    background: #1a1625;
    box-shadow: 0 25px 80px rgba(0,0,0,0.12), 0 4px 20px rgba(0,0,0,0.06);
    position: relative; z-index: 1;
  }

  .toolbar {
    height: 36px; background: #13101e; display: flex; align-items: center; padding: 0 14px; gap: 6px;
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot.r { background: #ff5f57; opacity: 0.7; }
  .dot.y { background: #febc2e; opacity: 0.7; }
  .dot.g { background: #28c840; opacity: 0.7; }
  .url {
    margin-left: 20px; background: rgba(255,255,255,0.05); padding: 3px 14px; border-radius: 5px;
    font-size: 11px; font-family: 'JetBrains Mono', monospace; color: rgba(255,255,255,0.25);
  }

  .content { padding: 40px; height: 464px; display: flex; align-items: center; gap: 60px; }

  .viz {
    width: 320px; height: 320px; position: relative; display: flex; align-items: center; justify-content: center;
  }

  /* Hand silhouette */
  .hand-area {
    width: 200px; height: 280px; position: relative;
  }
  .finger { position: absolute; background: rgba(167,139,250,0.15); border-radius: 20px; }
  .finger.f1 { width: 24px; height: 90px; top: 0; left: 40px; }
  .finger.f2 { width: 24px; height: 100px; top: -10px; left: 70px; }
  .finger.f3 { width: 24px; height: 95px; top: -5px; left: 100px; }
  .finger.f4 { width: 22px; height: 75px; top: 10px; left: 128px; }
  .palm { width: 120px; height: 100px; background: rgba(167,139,250,0.12); border-radius: 20px; position: absolute; top: 85px; left: 35px; }
  .thumb { width: 22px; height: 60px; background: rgba(167,139,250,0.12); border-radius: 15px; position: absolute; top: 100px; left: 10px; transform: rotate(30deg); }

  /* Wave rings */
  .ring { position: absolute; border: 1.5px solid rgba(167,139,250,0.15); border-radius: 50%; }
  .ring.r1 { width: 180px; height: 180px; top: 70px; left: 70px; }
  .ring.r2 { width: 240px; height: 240px; top: 40px; left: 40px; opacity: 0.7; }
  .ring.r3 { width: 300px; height: 300px; top: 10px; left: 10px; opacity: 0.4; }

  .info { flex: 1; }
  .mode-label { font-size: 9px; font-family: 'JetBrains Mono', monospace; color: rgba(167,139,250,0.5); text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 8px; }
  .mode-title { font-size: 36px; font-weight: 600; color: #e8e6e0; letter-spacing: -0.5px; margin-bottom: 4px; }
  .mode-sub { font-size: 14px; color: rgba(255,255,255,0.3); margin-bottom: 32px; line-height: 1.5; }

  .params { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .param { padding: 14px; background: rgba(167,139,250,0.06); border-radius: 8px; border: 1px solid rgba(167,139,250,0.08); }
  .param-label { font-size: 9px; font-family: 'JetBrains Mono', monospace; color: rgba(255,255,255,0.25); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
  .param-value { font-size: 18px; font-weight: 600; color: #a78bfa; font-family: 'JetBrains Mono', monospace; }
  .param-unit { font-size: 10px; color: rgba(255,255,255,0.2); margin-left: 4px; }

  .bar { width: 100%; height: 3px; background: rgba(255,255,255,0.05); border-radius: 2px; margin-top: 8px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 2px; background: rgba(167,139,250,0.4); }
</style>
</head>
<body>
<div class="card">
  <div class="deco1"></div>
  <div class="deco2"></div>
  <div class="browser">
    <div class="toolbar">
      <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
      <div class="url">air-composer.michaelpyon.com</div>
    </div>
    <div class="content">
      <div class="viz">
        <div class="ring r3"></div>
        <div class="ring r2"></div>
        <div class="ring r1"></div>
        <div class="hand-area">
          <div class="finger f1"></div>
          <div class="finger f2"></div>
          <div class="finger f3"></div>
          <div class="finger f4"></div>
          <div class="palm"></div>
          <div class="thumb"></div>
        </div>
      </div>
      <div class="info">
        <div class="mode-label">Instrument Mode</div>
        <div class="mode-title">Theremin</div>
        <div class="mode-sub">Move your hand to play. Height controls pitch, distance controls volume.</div>
        <div class="params">
          <div class="param">
            <div class="param-label">Frequency</div>
            <div class="param-value">442<span class="param-unit">Hz</span></div>
            <div class="bar"><div class="bar-fill" style="width: 65%;"></div></div>
          </div>
          <div class="param">
            <div class="param-label">Volume</div>
            <div class="param-value">0.72</div>
            <div class="bar"><div class="bar-fill" style="width: 72%;"></div></div>
          </div>
          <div class="param">
            <div class="param-label">Waveform</div>
            <div class="param-value">Sine</div>
          </div>
          <div class="param">
            <div class="param-label">Hands</div>
            <div class="param-value">1</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
