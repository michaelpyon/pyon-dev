<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 630px; overflow: hidden; font-family: 'General Sans', system-ui, sans-serif; }

  .card {
    width: 1200px; height: 630px;
    background: linear-gradient(135deg, #E8E5DD 0%, #E3E0D8 50%, #DDD9D0 100%);
    position: relative; display: flex; align-items: center; justify-content: center;
  }

  .deco1 { position: absolute; width: 400px; height: 400px; border-radius: 50%; background: #7dd3fc; opacity: 0.12; top: -100px; right: -80px; }
  .deco2 { position: absolute; width: 280px; height: 280px; border-radius: 50%; background: #38bdf8; opacity: 0.08; bottom: -60px; left: -40px; }

  .browser {
    width: 900px; height: 500px; border-radius: 12px; overflow: hidden;
    background: #141418;
    box-shadow: 0 25px 80px rgba(0,0,0,0.12), 0 4px 20px rgba(0,0,0,0.06);
    position: relative; z-index: 1;
  }

  .toolbar {
    height: 36px; background: #0e0e12; display: flex; align-items: center; padding: 0 14px; gap: 6px;
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot.r { background: #ff5f57; opacity: 0.7; }
  .dot.y { background: #febc2e; opacity: 0.7; }
  .dot.g { background: #28c840; opacity: 0.7; }
  .url {
    margin-left: 20px; background: rgba(255,255,255,0.05); padding: 3px 14px; border-radius: 5px;
    font-size: 11px; font-family: 'JetBrains Mono', monospace; color: rgba(255,255,255,0.25);
  }

  .content { padding: 32px 40px; height: 464px; display: flex; flex-direction: column; }

  .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
  .title { font-size: 20px; font-weight: 600; color: #e8e6e0; }
  .subtitle { font-size: 11px; color: rgba(255,255,255,0.25); margin-top: 4px; font-family: 'JetBrains Mono', monospace; }
  .song-tag { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: #38bdf8; background: rgba(56,189,248,0.1); padding: 4px 12px; border-radius: 4px; }

  /* Drum pad grid */
  .pads { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; flex: 1; }
  .pad {
    border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center;
    position: relative; border: 1px solid rgba(255,255,255,0.06);
  }
  .pad-key { font-size: 20px; font-weight: 600; font-family: 'JetBrains Mono', monospace; margin-bottom: 4px; }
  .pad-name { font-size: 9px; font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.5; }

  .pad.kick { background: rgba(56,189,248,0.12); }
  .pad.kick .pad-key { color: #38bdf8; }
  .pad.kick .pad-name { color: #38bdf8; }

  .pad.snare { background: rgba(244,63,94,0.10); }
  .pad.snare .pad-key { color: #f43f5e; }
  .pad.snare .pad-name { color: #f43f5e; }

  .pad.hat { background: rgba(251,191,36,0.10); }
  .pad.hat .pad-key { color: #fbbf24; }
  .pad.hat .pad-name { color: #fbbf24; }

  .pad.tom { background: rgba(74,222,128,0.10); }
  .pad.tom .pad-key { color: #4ade80; }
  .pad.tom .pad-name { color: #4ade80; }

  .pad.crash { background: rgba(167,139,250,0.10); }
  .pad.crash .pad-key { color: #a78bfa; }
  .pad.crash .pad-name { color: #a78bfa; }

  .pad.clap { background: rgba(251,146,60,0.10); }
  .pad.clap .pad-key { color: #fb923c; }
  .pad.clap .pad-name { color: #fb923c; }

  .pad.rim { background: rgba(236,72,153,0.10); }
  .pad.rim .pad-key { color: #ec4899; }
  .pad.rim .pad-name { color: #ec4899; }

  .pad.ride { background: rgba(34,211,238,0.10); }
  .pad.ride .pad-key { color: #22d3ee; }
  .pad.ride .pad-name { color: #22d3ee; }

  /* Active state indicator */
  .pad.active { box-shadow: inset 0 0 30px rgba(255,255,255,0.05); }
  .pad.active::after {
    content: ''; position: absolute; inset: 0; border-radius: 10px;
    border: 2px solid currentColor; opacity: 0.3;
  }

  .footer-bar {
    display: flex; justify-content: space-between; align-items: center; margin-top: 16px;
    padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.04);
  }
  .bpm { font-size: 12px; font-family: 'JetBrains Mono', monospace; color: rgba(255,255,255,0.3); }
  .bpm span { color: #38bdf8; font-weight: 500; }
  .recording { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: #f43f5e; display: flex; align-items: center; gap: 6px; }
  .rec-dot { width: 6px; height: 6px; border-radius: 50%; background: #f43f5e; }
</style>
</head>
<body>
<div class="card">
  <div class="deco1"></div>
  <div class="deco2"></div>
  <div class="browser">
    <div class="toolbar">
      <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
      <div class="url">keyboard-drummer</div>
    </div>
    <div class="content">
      <div class="header">
        <div>
          <div class="title">Keyboard Drummer</div>
          <div class="subtitle">Map keys to samples. Build patterns. Record.</div>
        </div>
        <div class="song-tag">Rock Kit</div>
      </div>

      <div class="pads">
        <div class="pad kick active"><div class="pad-key">A</div><div class="pad-name">Kick</div></div>
        <div class="pad snare"><div class="pad-key">S</div><div class="pad-name">Snare</div></div>
        <div class="pad hat"><div class="pad-key">D</div><div class="pad-name">Hi-Hat</div></div>
        <div class="pad tom"><div class="pad-key">F</div><div class="pad-name">Tom</div></div>
        <div class="pad crash"><div class="pad-key">G</div><div class="pad-name">Crash</div></div>
        <div class="pad clap"><div class="pad-key">H</div><div class="pad-name">Clap</div></div>
        <div class="pad rim active"><div class="pad-key">J</div><div class="pad-name">Rim</div></div>
        <div class="pad ride"><div class="pad-key">K</div><div class="pad-name">Ride</div></div>
      </div>

      <div class="footer-bar">
        <div class="bpm">BPM: <span>120</span></div>
        <div class="recording"><div class="rec-dot"></div>Recording</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
